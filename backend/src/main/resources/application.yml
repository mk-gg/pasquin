spring:
  application:
    name: notes
  threads:
    virtual:
      enabled: true

server:
  port: 8080

notes:
  rate-limit:
    create-per-hour: 30
    unlock-per-minute: 10
    mutate-per-minute: 120
    submit-per-hour: 10
    # App Runner sits in front of the app and appends the real client IP to
    # X-Forwarded-For, so exactly one hop is trusted. Override per environment.
    trusted-proxy-hops: 1
  cors:
    allowed-origins:
      - http://localhost:1234
      - http://localhost:4321
  aws:
    region: us-east-1
    table-name: notes
    bucket: notes-content
    submissions-table: notes-submissions
    users-table: notes-users
  auth:
    # Client ID is public. The JWT secret must be overridden in production via
    # the JWT_SECRET env var (the default here is for local dev only).
    google-client-id: ${GOOGLE_CLIENT_ID:371854982599-q0uu06bo4mvcq0cba2r5b42eso80jg9j.apps.googleusercontent.com}
    jwt-secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-please}
  mail:
    # Off by default; the aws profile enables it via NOTES_MAIL_ENABLED once
    # the SES domain identity is verified.
    enabled: false
    from: noreply@mkgg.dev
    to: hello@mkgg.dev
  limits:
    # 5 MB: generous for a text note (even with embedded images) while blocking
    # oversized bodies that would otherwise be buffered and parsed into memory.
    max-request-bytes: 5242880
